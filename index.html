<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Movie Search App Pro</title>
</head>
<body class="bg-gray-900 text-white font-sans flex h-screen overflow-hidden transition-all duration-700 ease-in-out bg-cover bg-center bg-no-repeat" id="app-body">
    
    <div class="absolute inset-0 bg-gray-900/85 z-0 pointer-events-none transition-colors duration-500" id="bg-overlay"></div>

    <aside class="z-10 relative w-64 bg-gray-900/80 backdrop-blur-md flex flex-col justify-between h-full border-r border-gray-800 hidden md:flex shadow-2xl">
        <div class="p-6">
            <h1 class="text-3xl font-bold mb-8 text-red-600 drop-shadow-md">MOVIES<span class="text-white">APP</span></h1>
            <nav class="space-y-4">
                <button onclick="showSearch()" class="w-full text-left p-3 rounded-lg bg-red-600 text-white font-bold transition shadow-lg" id="nav-search">Search Movies</button>
                <button onclick="showFavorites()" class="w-full text-left p-3 rounded-lg hover:bg-gray-700/50 transition text-gray-300" id="nav-fav">My Favorites</button>
            </nav>
        </div>
    </aside>

    <main class="z-10 relative flex-1 flex flex-col h-full overflow-y-auto p-4 md:p-8">
        
        <div class="md:hidden flex justify-between items-center mb-6 bg-gray-900/80 p-4 rounded-xl backdrop-blur-sm">
            <h1 class="text-2xl font-bold text-red-600">MOVIES<span class="text-white">APP</span></h1>
            <div class="flex gap-2">
                <button onclick="showSearch()" class="text-sm bg-red-600 px-3 py-2 rounded font-bold shadow-md">Search</button>
                <button onclick="showFavorites()" class="text-sm bg-gray-700 px-3 py-2 rounded text-white shadow-md">Favorites</button>
            </div>
        </div>

        <header class="mb-10" id="search-header">
            <form id="search-form" class="w-full max-w-3xl flex gap-3 mb-6">
                <input type="text" id="search-input" placeholder="Search for a movie..." 
                    class="flex-1 p-4 rounded-full bg-gray-800/80 border border-gray-600 focus:outline-none focus:border-red-500 text-lg shadow-lg backdrop-blur-sm transition">
                <button type="submit" class="bg-red-600 px-8 py-4 rounded-full font-bold hover:bg-red-700 transition shadow-lg hover:shadow-red-600/50">Search</button>
            </form>

            <div class="flex flex-wrap gap-3" id="mood-filters">
                <button onclick="getMovies(DISCOVER_API)" class="px-5 py-2 rounded-full border border-red-500 bg-red-500/20 hover:bg-red-500/40 transition text-sm font-bold backdrop-blur-sm shadow-md">🔥 Trending</button>
                <button onclick="filterByGenre(28)" class="px-5 py-2 rounded-full border border-gray-500 hover:border-red-500 hover:bg-red-500/20 transition text-sm font-semibold backdrop-blur-sm bg-black/50 shadow-md">💥 Action</button>
                <button onclick="filterByGenre(35)" class="px-5 py-2 rounded-full border border-gray-500 hover:border-red-500 hover:bg-red-500/20 transition text-sm font-semibold backdrop-blur-sm bg-black/50 shadow-md">😂 Comedy</button>
                <button onclick="filterByGenre(27)" class="px-5 py-2 rounded-full border border-gray-500 hover:border-red-500 hover:bg-red-500/20 transition text-sm font-semibold backdrop-blur-sm bg-black/50 shadow-md">👻 Spooky</button>
                <button onclick="filterByGenre(878)" class="px-5 py-2 rounded-full border border-gray-500 hover:border-red-500 hover:bg-red-500/20 transition text-sm font-semibold backdrop-blur-sm bg-black/50 shadow-md">👽 Sci-Fi</button>
                <button onclick="filterByGenre(10749)" class="px-5 py-2 rounded-full border border-gray-500 hover:border-red-500 hover:bg-red-500/20 transition text-sm font-semibold backdrop-blur-sm bg-black/50 shadow-md">❤️ Date Night</button>
            </div>
        </header>
        
        <h2 id="page-title" class="text-4xl font-bold mb-8 hidden drop-shadow-lg">My Favorites</h2>

        <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col items-end pointer-events-none"></div>

        <div id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-y-12 gap-x-6 pb-10 mt-4">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
